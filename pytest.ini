[pytest]
# ── Discovery ─────────────────────────────────────────────────────
testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# ── Custom markers ────────────────────────────────────────────────
markers =
    unit:        Pure unit tests (no I/O)
    api:         Flask test-client API tests
    model:       PyTorch model evaluation tests
    retrain:     Retraining workflow tests
    database:    MySQL database tests (requires live DB)
    security:    Security / penetration tests
    performance: Load and stress tests (requires live server)
    integration: End-to-end workflow tests (requires live server)
    frontend:    Jest / React tests (not run by pytest)

# ── Environment ───────────────────────────────────────────────────
env =
    TESTING=1
    DB_NAME=hybrid_recommender_db
